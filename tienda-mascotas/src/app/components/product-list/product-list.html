<section class="product-list-section">
	<div class="list-controls">
		@if (authService.isAdmin()) {
			<div class="admin-actions-row">
				<button type="button" class="btn-add-product" (click)="anadirProducto()">
					+ Anadir producto
				</button>
			</div>
		}

		<input
			type="search"
			class="search-input"
			placeholder="🔍 Buscar productos..."
			(input)="onSearch($event)"
		/>
		<div class="filter-tabs">
			@for (cat of categorias; track cat.key) {
				<button
					class="tab-btn"
					[class.active]="categoriaActiva() === cat.key"
					(click)="setCategoria(cat.key)"
				>
					{{ cat.label }}
				</button>
			}
		</div>
	</div>

	@if (productosFiltrados().length === 0) {
		<div class="empty-state">
			<span class="empty-icon">🐾</span>
			<p>No se encontraron productos</p>
		</div>
	} @else {
		<div class="products-grid">
			@for (product of productosFiltrados(); track product.id) {
				<app-product-card
					[product]="product"
					(viewRequested)="verProducto($event)"
					(editRequested)="editarProducto($event)"
					(deleteRequested)="borrarProducto($event)"
				/>
			}
		</div>
	}
</section>

<!-- Modal de detalle del producto -->
<app-product-detail-modal
	[product]="productolModaleVisible()"
	(closed)="cerrarModal()"
></app-product-detail-modal>
