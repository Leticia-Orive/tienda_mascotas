<header class="site-header">
  <div class="header-container">
    <a routerLink="/" class="logo">
      <span class="logo-icon">🐾</span>
      <span class="logo-text">PetShop</span>
    </a>

    <nav class="main-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
      <a routerLink="/catalogo" routerLinkActive="active">Catálogo</a>
      @if (authService.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active">Admin</a>
      }
    </nav>

    <div class="header-actions">
      @if (authService.isLoggedIn()) {
        <p class="user-email">
          {{ authService.currentUserEmail() }}
          @if (authService.isAdmin()) {
            <span class="admin-badge">Admin</span>
          }
        </p>

        <button type="button" class="session-btn" (click)="onSesionClick($event)">
          <span class="session-icon">🔓</span>
          <span>Cerrar sesión</span>
        </button>

        <button type="button" class="delete-account-btn" (click)="onEliminarCuenta()">
          Cerrar mi cuenta
        </button>

      } @else {
        <a routerLink="/login" class="session-btn enter-btn">
          <span class="session-icon">🔐</span>
          <span>Entrar</span>
        </a>
      }

      <a routerLink="/carrito" class="cart-btn" [class.has-items]="cartService.totalItems() > 0">
        <span class="cart-icon">🛒</span>
        <span class="cart-label">Carrito</span>
        @if (cartService.totalItems() > 0) {
          <span class="cart-badge">{{ cartService.totalItems() }}</span>
        }
      </a>
    </div>
  </div>
</header>
